<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GoodFinds AI</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

h1{
color:#22c55e;
}

.container{
max-width:450px;
margin:auto;
}

input{
width:95%;
padding:12px;
margin:8px;
border-radius:8px;
border:none;
font-size:16px;
}

button{
background:#22c55e;
border:none;
padding:14px;
width:95%;
font-size:18px;
border-radius:10px;
margin-top:10px;
}

.toggle{
margin:10px;
}

.results{
margin-top:25px;
background:#1e293b;
padding:20px;
border-radius:12px;
}

.metric{
margin:8px 0;
font-size:18px;
}

.decision{
font-size:28px;
margin-top:15px;
font-weight:bold;
}

.buy{ color:#22c55e; }
.maybe{ color:#eab308; }
.pass{ color:#ef4444; }

</style>
</head>

<body>

<div class="container">

<h1>GoodFinds AI</h1>
<p>Thrift Sourcing Tool</p>

<input id="brand" placeholder="Brand (Nike)">
<input id="item" placeholder="Item (Golf Polo)">
<input id="size" placeholder="Size (XL)">
<input id="cost" placeholder="Buy Cost ($)">

<input id="shipping" placeholder="Shipping Cost ($)" value="6.25">

<div class="toggle">
<label>
<input type="checkbox" id="buyerShipping">
Buyer Pays Shipping
</label>
</div>

<button onclick="runCalc()">Run Research</button>

<div class="results">

<div class="metric" id="str"></div>
<div class="metric" id="prices"></div>
<div class="metric" id="profit"></div>

<div class="decision" id="decision"></div>

</div>

</div>

<script>

function runCalc(){

let cost = parseFloat(document.getElementById("cost").value);
let shipping = parseFloat(document.getElementById("shipping").value);
let buyerPays = document.getElementById("buyerShipping").checked;

/* Demo data until eBay API is connected */

let sold = 45;
let active = 30;

let low = 18;
let avg = 24;
let high = 32;

let str = (sold/active)*100;

let price = avg;

let ebayFee = price * 0.1325;

let supplies = 0.50;

let shippingCost = buyerPays ? 0 : shipping;

let profit = price - ebayFee - supplies - shippingCost - cost;

/* Decision Logic */

let decisionText;
let decisionClass;

if(profit >= 8 && str >= 100){
decisionText="BUY";
decisionClass="buy";
}
else if(profit >=5){
decisionText="MAYBE";
decisionClass="maybe";
}
else{
decisionText="PASS";
decisionClass="pass";
}

document.getElementById("str").innerHTML =
"Sell Through Rate: " + str.toFixed(0) + "%";

document.getElementById("prices").innerHTML =
"Low: $" + low + " | Avg: $" + avg + " | High: $" + high;

document.getElementById("profit").innerHTML =
"Estimated Profit: $" + profit.toFixed(2);

document.getElementById("decision").innerHTML = decisionText;

document.getElementById("decision").className = "decision " + decisionClass;

}

</script>

</body>
</html>
