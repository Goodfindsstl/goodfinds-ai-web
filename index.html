<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>GoodFinds AI</title>

<style>

body{
font-family:Arial;
background:#020617;
color:white;
text-align:center;
padding:20px;
}

h1{
color:#22c55e;
}

.container{
max-width:520px;
margin:auto;
}

input,select{
width:95%;
padding:12px;
margin:8px;
border-radius:8px;
border:none;
font-size:16px;
}

button{
width:95%;
padding:14px;
border-radius:10px;
font-size:18px;
border:none;
margin-top:10px;
}

.run{background:#22c55e;}
.scan{background:#0ea5e9;}
.thrift{background:#7c3aed;}

.results{
margin-top:20px;
background:#1e293b;
padding:20px;
border-radius:12px;
}

.metric{
margin:6px 0;
font-size:18px;
}

.buy{color:#22c55e;font-size:30px;}
.maybe{color:#facc15;font-size:30px;}
.pass{color:#ef4444;font-size:30px;}

</style>

</head>

<body>

<div class="container">

<h1>GoodFinds AI</h1>

<input id="brand" placeholder="Brand">

<input id="item" placeholder="Item">

<input id="size" placeholder="Size">

<select id="condition">

<option value="preowned">Preowned</option>
<option value="new_with_tags">New With Tags</option>
<option value="new_without_tags">New Without Tags</option>

</select>

<input id="cost" placeholder="Buy Cost">

<input id="shipping" value="6.25">

<label>
<input type="checkbox" id="buyerShipping">
Buyer Pays Shipping
</label>

<button class="run" onclick="runResearch()">Run Research</button>

<button class="scan" onclick="scanPhoto()">📸 Scan Item</button>

<button class="thrift" onclick="toggleThrift()">⚡ Thrift Mode</button>

<div class="results">

<div id="prices" class="metric"></div>

<div id="listprice" class="metric"></div>

<div id="profit" class="metric"></div>

<div id="roi" class="metric"></div>

<div id="heat" class="metric"></div>

<div id="flip" class="metric"></div>

<div id="demand" class="metric"></div>

<div id="competition" class="metric"></div>

<div id="confidence" class="metric"></div>

<div id="decision"></div>

</div>

</div>

<script>

function toggleThrift(){

alert("⚡ Thrift Mode Activated")

}

async function runResearch(){

let brand=document.getElementById("brand").value
let item=document.getElementById("item").value
let size=document.getElementById("size").value
let condition=document.getElementById("condition").value
let cost=document.getElementById("cost").value
let shipping=document.getElementById("shipping").value
let buyerShipping=document.getElementById("buyerShipping").checked

let url=`https://goodfinds-backend.vercel.app/api/research?brand=${brand}&item=${item}&size=${size}&condition=${condition}&buyCost=${cost}&shippingCost=${shipping}&buyerPaysShipping=${buyerShipping}`

let res=await fetch(url)

let data=await res.json()

document.getElementById("prices").innerHTML=
`Low: $${data.lowSoldPrice} | Avg: $${data.avgSoldPrice} | High: $${data.highSoldPrice}`

document.getElementById("listprice").innerHTML=
`Recommended Listing Price: $${data.recommendedListingPrice}`

document.getElementById("profit").innerHTML=
`Profit: $${data.estimatedProfit}`

document.getElementById("roi").innerHTML=
`ROI: ${data.roiPercent}%`

document.getElementById("heat").innerHTML=
`${data.profitHeat}`

document.getElementById("flip").innerHTML=
`Flip Speed: ${data.flipSpeed}`

document.getElementById("demand").innerHTML=
`Demand Score: ${data.demandScore}/10`

document.getElementById("competition").innerHTML=
`Competition Score: ${data.competitionScore}/10`

document.getElementById("confidence").innerHTML=
`Profit Confidence: ${data.profitConfidence}/10`

let decision=data.decision

let el=document.getElementById("decision")

if(decision==="BUY"){
el.className="buy"
el.innerHTML="👍 BUY"
}

if(decision==="MAYBE"){
el.className="maybe"
el.innerHTML="⚠️ MAYBE"
}

if(decision==="PASS"){
el.className="pass"
el.innerHTML="👎 PASS"
}

}

async function scanPhoto(){

const input=document.createElement("input")
input.type="file"
input.accept="image/*"

input.onchange=function(){

const file=input.files[0]

const reader=new FileReader()

reader.onload=async function(){

const base64=reader.result.split(",")[1]

const res=await fetch(
"https://goodfinds-backend.vercel.app/api/photo-scan",
{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({imageBase64:base64})
}
)

const data=await res.json()

document.getElementById("brand").value=data.brandGuess||""
document.getElementById("item").value=data.itemGuess||""

}

reader.readAsDataURL(file)

}

input.click()

}

</script>

</body>
</html>
