<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GoodFinds AI</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

h1{
color:#22c55e;
}

.container{
max-width:450px;
margin:auto;
}

input{
width:95%;
padding:12px;
margin:8px;
border-radius:8px;
border:none;
font-size:16px;
}

button{
background:#22c55e;
border:none;
padding:14px;
width:95%;
font-size:18px;
border-radius:10px;
margin-top:10px;
}

.toggle{
margin:10px;
}

.results{
margin-top:25px;
background:#1e293b;
padding:20px;
border-radius:12px;
}

.metric{
margin:8px 0;
font-size:18px;
}

.decision{
font-size:28px;
margin-top:15px;
font-weight:bold;
}

.buy{ color:#22c55e; }
.maybe{ color:#eab308; }
.pass{ color:#ef4444; }

</style>
</head>

<body>

<div class="container">

<h1>GoodFinds AI</h1>
<p>Thrift Sourcing Tool</p>

<input id="brand" placeholder="Brand (Nike)">
<input id="item" placeholder="Item (Golf Polo)">
<input id="size" placeholder="Size (XL)">
<input id="cost" placeholder="Buy Cost ($)">

<input id="shipping" placeholder="Shipping Cost ($)" value="6.25">

<div class="toggle">
<label>
<input type="checkbox" id="buyerShipping">
Buyer Pays Shipping
</label>
</div>

<button onclick="runCalc()">Run Research</button>

<div class="results">

<div class="metric" id="str"></div>
<div class="metric" id="prices"></div>
<div class="metric" id="profit"></div>

<div class="decision" id="decision"></div>

</div>

</div>

<script>
async function runCalc() {
  const brand = document.getElementById("brand").value.trim();
  const item = document.getElementById("item").value.trim();
  const size = document.getElementById("size").value.trim();
  const cost = parseFloat(document.getElementById("cost").value || 0);
  const shipping = parseFloat(document.getElementById("shipping").value || 0);
  const buyerPays = document.getElementById("buyerShipping").checked;

  if (!brand || !item || !size) {
    document.getElementById("str").innerHTML = "Please enter brand, item, and size.";
    document.getElementById("prices").innerHTML = "";
    document.getElementById("profit").innerHTML = "";
    document.getElementById("decision").innerHTML = "";
    return;
  }

  document.getElementById("str").innerHTML = "Loading live eBay data...";
  document.getElementById("prices").innerHTML = "";
  document.getElementById("profit").innerHTML = "";
  document.getElementById("decision").innerHTML = "";

  try {
    const url =
      `https://goodfinds-backend.vercel.app/api/research` +
      `?brand=${encodeURIComponent(brand)}` +
      `&item=${encodeURIComponent(item)}` +
      `&size=${encodeURIComponent(size)}` +
      `&buyCost=${encodeURIComponent(cost)}`;

    const response = await fetch(url);
    const data = await response.json();

    if (!response.ok) {
      throw new Error(data.error || "API request failed");
    }

    const low = Number(
      data.lowSoldPrice ?? data.lowPrice ?? 0
    );
    const avg = Number(
      data.avgSoldPrice ?? data.avgPrice ?? 0
    );
    const high = Number(
      data.highSoldPrice ?? data.highPrice ?? 0
    );

    const str =
      Number(data.sellThroughPercent ?? data.sellThrough ?? 0);

    const recommendedPrice = Number(
      data.recommendedListingPrice ?? data.recommendedPrice ?? avg
    );

    const ebayFee = recommendedPrice * 0.1325;
    const supplies = 0.50;
    const shippingCost = buyerPays ? 0 : shipping;
    const profit = recommendedPrice - ebayFee - supplies - shippingCost - cost;

    let decisionText;
    let decisionClass;

    if (profit >= 8 && str >= 100) {
      decisionText = "BUY";
      decisionClass = "buy";
    } else if (profit >= 5) {
      decisionText = "MAYBE";
      decisionClass = "maybe";
    } else {
      decisionText = "PASS";
      decisionClass = "pass";
    }

    document.getElementById("str").innerHTML =
      "Sell Through Rate: " + (str ? str.toFixed(0) : "N/A") + (str ? "%" : "");

    document.getElementById("prices").innerHTML =
      "Low: $" + low.toFixed(2) +
      " | Avg: $" + avg.toFixed(2) +
      " | High: $" + high.toFixed(2);

    document.getElementById("profit").innerHTML =
      "Estimated Profit: $" + profit.toFixed(2) +
      " | List Price: $" + recommendedPrice.toFixed(2);

    document.getElementById("decision").innerHTML = decisionText;
    document.getElementById("decision").className = "decision " + decisionClass;

  } catch (error) {
    document.getElementById("str").innerHTML = "Error: " + error.message;
    document.getElementById("prices").innerHTML = "";
    document.getElementById("profit").innerHTML = "";
    document.getElementById("decision").innerHTML = "";
    document.getElementById("decision").className = "decision";
  }
}
</script>

</body>
</html>
