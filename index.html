<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>GoodFinds AI</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

h1{
color:#22c55e;
}

.container{
max-width:500px;
margin:auto;
}

input,select{
width:95%;
padding:12px;
margin:8px;
border-radius:8px;
border:none;
font-size:16px;
}

button{
background:#22c55e;
border:none;
padding:14px;
width:95%;
font-size:18px;
border-radius:10px;
margin-top:10px;
}

.results{
margin-top:25px;
background:#1e293b;
padding:20px;
border-radius:12px;
}

.metric{
margin:8px 0;
font-size:18px;
}

.decision{
font-size:32px;
margin-top:15px;
font-weight:bold;
}

.buy{ color:#22c55e; }
.maybe{ color:#eab308; }
.pass{ color:#ef4444; }

.heat{
font-size:20px;
margin-top:10px;
}

.thriftMode{
background:#0ea5e9;
margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<h1>GoodFinds AI</h1>

<p>Thrift Sourcing Tool</p>

<input id="brand" placeholder="Brand (Nike)">
<input id="item" placeholder="Item (Golf Polo)">
<input id="size" placeholder="Size (XL)">

<select id="condition">

<option value="preowned">Preowned</option>
<option value="new_with_tags">New With Tags</option>
<option value="new_without_tags">New Without Tags</option>

</select>

<input id="cost" placeholder="Buy Cost ($)">

<input id="shipping" placeholder="Shipping Cost ($)" value="6.25">

<label>
<input type="checkbox" id="buyerShipping">
Buyer Pays Shipping
</label>

<button onclick="runCalc()">Run Research</button>

<button class="thriftMode" onclick="toggleThrift()">THRIFT MODE</button>

<div class="results">

<div class="metric" id="prices"></div>

<div class="metric" id="profit"></div>

<div class="metric" id="roi"></div>

<div class="metric" id="flip"></div>

<div class="metric" id="demand"></div>

<div class="metric" id="saturation"></div>

<div class="metric" id="competition"></div>

<div class="metric" id="confidence"></div>

<div class="metric" id="fastflip"></div>

<div class="heat" id="profitHeat"></div>

<div class="metric" id="title"></div>

<div class="decision" id="decision"></div>

</div>

</div>

<script>

let thriftMode=false

function toggleThrift(){

thriftMode=!thriftMode

if(thriftMode){

document.body.style.background="#020617"

alert("Thrift Mode Activated — Fast scanning mode")

}else{

document.body.style.background="#0f172a"

}

}

async function runCalc(){

let brand=document.getElementById("brand").value
let item=document.getElementById("item").value
let size=document.getElementById("size").value
let cost=document.getElementById("cost").value
let shipping=document.getElementById("shipping").value
let condition=document.getElementById("condition").value

let buyerShipping=document.getElementById("buyerShipping").checked

let url=`https://goodfinds-backend.vercel.app/api/research?brand=${brand}&item=${item}&size=${size}&condition=${condition}&buyCost=${cost}&shippingCost=${shipping}&buyerPaysShipping=${buyerShipping}`

let res=await fetch(url)

let data=await res.json()

document.getElementById("prices").innerHTML=
`Low: $${data.lowSoldPrice} | Avg: $${data.avgSoldPrice} | High: $${data.highSoldPrice}`

document.getElementById("profit").innerHTML=
`Estimated Profit: $${data.estimatedProfit}`

document.getElementById("roi").innerHTML=
`ROI: ${data.roiPercent}%`

document.getElementById("flip").innerHTML=
`Flip Speed: ${data.flipSpeed}`

document.getElementById("demand").innerHTML=
`Demand Score: ${data.demandScore}/10`

document.getElementById("saturation").innerHTML=
`Saturation Score: ${data.saturationScore}/10`

document.getElementById("competition").innerHTML=
`Competition Score: ${data.competitionScore}/10`

document.getElementById("confidence").innerHTML=
`Profit Confidence: ${data.profitConfidence}/10`

document.getElementById("fastflip").innerHTML=
`Fast Flip Probability: ${data.fastFlipProbability}%`

document.getElementById("profitHeat").innerHTML=
`${data.profitHeat}`

document.getElementById("title").innerHTML=
`Suggested Title: ${data.suggestedTitle}`

let decision=data.decision

let decisionClass="pass"

if(decision==="BUY") decisionClass="buy"

if(decision==="MAYBE") decisionClass="maybe"

document.getElementById("decision").innerHTML=decision

document.getElementById("decision").className="decision "+decisionClass

}

</script>

</body>

</html>
