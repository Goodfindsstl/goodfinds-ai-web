<!DOCTYPE html>
<html>
<head>
<title>GoodFinds AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
padding:30px;
}

h1{
color:#4ade80;
}

input{
width:90%;
padding:12px;
margin:10px;
border-radius:8px;
border:none;
font-size:16px;
}

button{
background:#4ade80;
border:none;
padding:14px 20px;
font-size:18px;
border-radius:10px;
cursor:pointer;
}

.result{
margin-top:20px;
font-size:20px;
}
</style>
</head>

<body>

<h1>GoodFinds AI</h1>
<p>Thrift Profit Calculator</p>

<input id="cost" placeholder="Item Cost ($)">
<input id="price" placeholder="Expected Sale Price ($)">

<button onclick="calc()">Calculate Profit</button>

<div class="result" id="result"></div>

<script>
function calc(){
let cost = parseFloat(document.getElementById("cost").value);
let price = parseFloat(document.getElementById("price").value);

let ebayFee = price * 0.13;
let shipping = 6;
let profit = price - ebayFee - shipping - cost;

document.getElementById("result").innerHTML =
"Estimated Profit: $" + profit.toFixed(2);
}
</script>

</body>
</html>
