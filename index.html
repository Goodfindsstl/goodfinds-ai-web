<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GoodFinds AI</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

h1{
color:#22c55e;
}

.container{
max-width:500px;
margin:auto;
}

input{
width:95%;
padding:14px;
margin:10px;
border-radius:10px;
border:none;
font-size:18px;
}

button{
background:#22c55e;
border:none;
padding:16px;
width:95%;
font-size:20px;
border-radius:12px;
margin-top:15px;
color:black;
font-weight:bold;
}

.results{
margin-top:25px;
background:#1e293b;
padding:20px;
border-radius:15px;
}

.metric{
margin:8px 0;
font-size:18px;
}

.decision{
font-size:34px;
margin-top:15px;
font-weight:bold;
}

.buy{ color:#22c55e; }
.maybe{ color:#eab308; }
.pass{ color:#ef4444; }

.heat{
font-size:22px;
margin:8px 0;
font-weight:bold;
}

.titleBox{
background:#0f172a;
padding:10px;
border-radius:10px;
margin-top:10px;
font-size:16px;
}

</style>
</head>

<body>

<div class="container">

<h1>GoodFinds AI</h1>
<p>Thrift Sourcing Tool</p>

<input id="brand" placeholder="Brand (Nike)">
<input id="item" placeholder="Item (Golf Polo)">
<input id="size" placeholder="Size (XL)">
<input id="cost" placeholder="Buy Cost ($)">
<input id="shipping" placeholder="Shipping Cost ($)" value="6.25">

<button onclick="runResearch()">Run Research</button>

<div class="results">

<div class="metric" id="str"></div>
<div class="metric" id="prices"></div>
<div class="metric" id="listPrice"></div>
<div class="metric" id="profit"></div>
<div class="metric" id="roi"></div>

<div class="heat" id="demand"></div>
<div class="heat" id="profitHeat"></div>

<div class="titleBox" id="title"></div>

<div class="decision" id="decision"></div>

</div>

</div>

<script>

async function runResearch(){

const brand = document.getElementById("brand").value
const item = document.getElementById("item").value
const size = document.getElementById("size").value
const cost = document.getElementById("cost").value

const url =
"https://goodfinds-backend.vercel.app/api/research" +
`?brand=${brand}&item=${item}&size=${size}&buyCost=${cost}`

try{

const res = await fetch(url)
const data = await res.json()

if(data.error){
document.getElementById("str").innerHTML = "Error: "+data.error
return
}

const str = data.sellThroughPercent || 0
const low = data.lowSoldPrice || 0
const avg = data.avgSoldPrice || 0
const high = data.highSoldPrice || 0
const list = data.recommendedListingPrice || 0
const profit = data.estimatedProfit || 0
const roi = data.roiPercent || 0

document.getElementById("str").innerHTML =
"Sell Through Rate: "+str+"%"

document.getElementById("prices").innerHTML =
"Low: $"+low+" | Avg: $"+avg+" | High: $"+high

document.getElementById("listPrice").innerHTML =
"Recommended Price: $"+list

document.getElementById("profit").innerHTML =
"Estimated Profit: $"+profit

document.getElementById("roi").innerHTML =
"ROI: "+roi+"%"

/* DEMAND HEAT */

let demandText=""

if(str > 200) demandText="🔥 VERY HOT DEMAND"
else if(str > 120) demandText="🔥 HOT DEMAND"
else if(str > 80) demandText="⚠️ MEDIUM DEMAND"
else demandText="❄️ LOW DEMAND"

document.getElementById("demand").innerHTML = demandText

/* PROFIT HEAT */

let profitText=""

if(profit > 20) profitText="🔥 HOT DEAL"
else if(profit > 10) profitText="👍 GOOD PROFIT"
else if(profit > 5) profitText="⚠️ SMALL PROFIT"
else profitText="❌ LOW PROFIT"

document.getElementById("profitHeat").innerHTML = profitText

/* TITLE */

document.getElementById("title").innerHTML =
"Suggested Title:<br>"+(data.suggestedTitle || "")

/* DECISION */

let decision = data.decision || "PASS"
let decisionClass="pass"

if(decision==="BUY") decisionClass="buy"
if(decision==="MAYBE") decisionClass="maybe"

const d = document.getElementById("decision")

d.innerHTML = decision
d.className = "decision "+decisionClass

}
catch(err){

document.getElementById("str").innerHTML =
"Error connecting to API"

}

}

</script>

</body>
</html>
