<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GoodFinds AI</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b1533;
      color: white;
      text-align: center;
      padding: 20px;
      margin: 0;
    }
    h1 {
      color: #4fd266;
      font-size: 58px;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 18px;
      color: #dbeafe;
      margin-bottom: 26px;
    }
    .container {
      max-width: 760px;
      margin: 0 auto;
    }
    input {
      width: 100%;
      padding: 18px;
      margin: 10px 0;
      border-radius: 14px;
      border: none;
      font-size: 22px;
      box-sizing: border-box;
      color: #111827;
    }
    button {
      background: #4fd266;
      border: none;
      padding: 18px;
      width: 100%;
      font-size: 24px;
      border-radius: 14px;
      margin-top: 18px;
      color: #0b1533;
      font-weight: bold;
      cursor: pointer;
    }
    button:disabled { opacity: 0.7; }
    .toggle {
      margin: 22px 0;
      font-size: 20px;
    }
    .results {
      margin-top: 30px;
      background: #1f2d45;
      padding: 24px;
      border-radius: 18px;
      min-height: 200px;
    }
    .metric {
      margin: 10px 0;
      font-size: 22px;
      line-height: 1.5;
    }
    .heat {
      font-size: 24px;
      font-weight: bold;
      margin-top: 10px;
    }
    .title-box {
      background: rgba(255, 255, 255, 0.08);
      padding: 14px;
      border-radius: 12px;
      margin-top: 16px;
      font-size: 18px;
      line-height: 1.5;
      word-break: break-word;
    }
    .decision {
      font-size: 42px;
      margin-top: 20px;
      font-weight: bold;
    }
    .buy { color: #4fd266; }
    .maybe { color: #facc15; }
    .pass { color: #ef4444; }
    .error { color: #fca5a5; }
    .loading { color: #93c5fd; }
  </style>
</head>
<body>
  <div class="container">
    <h1>GoodFinds AI</h1>
    <div class="subtitle">Thrift Sourcing Tool</div>

    <input id="brand" placeholder="Brand (Nike)" />
    <input id="item" placeholder="Item (Golf Polo)" />
    <input id="size" placeholder="Size (XL)" />
    <input id="cost" placeholder="Buy Cost ($)" type="number" step="0.01" />
    <input id="shipping" placeholder="Shipping Cost ($)" type="number" step="0.01" value="6.25" />

    <div class="toggle">
      <label>
        <input type="checkbox" id="buyerShipping" />
        Buyer Pays Shipping
      </label>
    </div>

    <button id="runBtn" onclick="runResearch()">Run Research</button>

    <div class="results">
      <div class="metric" id="status">Enter an item and tap Run Research</div>
      <div class="metric" id="str"></div>
      <div class="metric" id="prices"></div>
      <div class="metric" id="listPrice"></div>
      <div class="metric" id="profit"></div>
      <div class="metric" id="roi"></div>
      <div class="heat" id="demandHeat"></div>
      <div class="heat" id="profitHeat"></div>
      <div class="title-box" id="titleBox" style="display:none;"></div>
      <div class="decision" id="decision"></div>
    </div>
  </div>

  <script>
    async function runResearch() {
      const brand = document.getElementById("brand").value.trim();
      const item = document.getElementById("item").value.trim();
      const size = document.getElementById("size").value.trim();
      const cost = document.getElementById("cost").value.trim();
      const shipping = document.getElementById("shipping").value.trim();
      const buyerPaysShipping = document.getElementById("buyerShipping").checked;

      const runBtn = document.getElementById("runBtn");
      const status = document.getElementById("status");
      const str = document.getElementById("str");
      const prices = document.getElementById("prices");
      const listPrice = document.getElementById("listPrice");
      const profit = document.getElementById("profit");
      const roi = document.getElementById("roi");
      const demandHeat = document.getElementById("demandHeat");
      const profitHeat = document.getElementById("profitHeat");
      const titleBox = document.getElementById("titleBox");
      const decision = document.getElementById("decision");

      status.className = "metric loading";
      status.innerHTML = "Loading live eBay data...";
      str.innerHTML = "";
      prices.innerHTML = "";
      listPrice.innerHTML = "";
      profit.innerHTML = "";
      roi.innerHTML = "";
      demandHeat.innerHTML = "";
      profitHeat.innerHTML = "";
      titleBox.style.display = "none";
      titleBox.innerHTML = "";
      decision.innerHTML = "";
      decision.className = "decision";

      if (!brand || !item) {
        status.className = "metric error";
        status.innerHTML = "Please enter at least brand and item.";
        return;
      }

      runBtn.disabled = true;

      try {
        const url =
          "https://goodfinds-backend.vercel.app/api/research" +
          `?brand=${encodeURIComponent(brand)}` +
          `&item=${encodeURIComponent(item)}` +
          `&size=${encodeURIComponent(size)}` +
          `&buyCost=${encodeURIComponent(cost || 0)}` +
          `&shippingCost=${encodeURIComponent(shipping || 0)}` +
          `&buyerPaysShipping=${buyerPaysShipping}`;

        const res = await fetch(url);
        const data = await res.json();

        if (!res.ok || data.error) {
          status.className = "metric error";
          status.innerHTML = `Error: ${data.error || "Unable to run research"}`;
          return;
        }

        status.className = "metric";
        status.innerHTML = data.query || `${brand} ${item} ${size}`;

        str.innerHTML = `Sell Through Rate: ${data.sellThroughPercent}%`;
        prices.innerHTML = `Low: $${data.lowSoldPrice} | Avg: $${data.avgSoldPrice} | High: $${data.highSoldPrice}`;
        listPrice.innerHTML = `Recommended Price: $${data.recommendedListingPrice}`;
        profit.innerHTML = `Estimated Profit: $${data.estimatedProfit}`;
        roi.innerHTML = `ROI: ${data.roiPercent}%`;

        demandHeat.innerHTML = data.demandHeat || "";
        profitHeat.innerHTML = data.profitHeat || "";

        if (data.suggestedTitle) {
          titleBox.style.display = "block";
          titleBox.innerHTML = `<strong>Suggested Title:</strong><br>${data.suggestedTitle}`;
        }

        decision.innerHTML = data.decision || "PASS";
        if (data.decision === "BUY") decision.className = "decision buy";
        else if (data.decision === "MAYBE") decision.className = "decision maybe";
        else decision.className = "decision pass";

      } catch (err) {
        status.className = "metric error";
        status.innerHTML = "Error connecting to API";
      } finally {
        runBtn.disabled = false;
      }
    }
  </script>
</body>
</html>
