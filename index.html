<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GoodFinds AI</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #08122e;
      color: white;
      text-align: center;
      padding: 20px;
      margin: 0;
    }

    h1 {
      color: #22c55e;
      margin-bottom: 8px;
      font-size: 56px;
    }

    .subtitle {
      margin-bottom: 24px;
      color: #dbeafe;
      font-size: 18px;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
    }

    input {
      width: 100%;
      padding: 16px;
      margin: 10px 0;
      border-radius: 14px;
      border: none;
      font-size: 22px;
      box-sizing: border-box;
    }

    button {
      background: #22c55e;
      color: #0b1220;
      border: none;
      padding: 18px;
      width: 100%;
      font-size: 24px;
      border-radius: 14px;
      margin-top: 20px;
      cursor: pointer;
      font-weight: bold;
    }

    button:disabled {
      opacity: 0.7;
      cursor: wait;
    }

    .toggle {
      margin: 22px 0;
      font-size: 20px;
    }

    .results {
      margin-top: 30px;
      background: #1e293b;
      padding: 28px;
      border-radius: 18px;
      min-height: 180px;
    }

    .metric {
      margin: 12px 0;
      font-size: 22px;
      line-height: 1.5;
    }

    .decision {
      font-size: 42px;
      margin-top: 18px;
      font-weight: bold;
    }

    .buy { color: #22c55e; }
    .maybe { color: #eab308; }
    .pass { color: #ef4444; }
    .loading { color: #93c5fd; }
    .error { color: #fca5a5; }

    .small {
      font-size: 18px;
      color: #cbd5e1;
      line-height: 1.5;
    }

    .heat {
      font-size: 24px;
      font-weight: bold;
      margin-top: 10px;
    }

    .title-box {
      margin-top: 16px;
      padding: 14px;
      background: rgba(255,255,255,0.06);
      border-radius: 12px;
      font-size: 18px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>GoodFinds AI</h1>
    <div class="subtitle">Thrift Sourcing Tool</div>

    <input id="brand" placeholder="Brand (Nike)" />
    <input id="item" placeholder="Item (Golf Polo)" />
    <input id="size" placeholder="Size (XL)" />
    <input id="cost" placeholder="Buy Cost ($)" type="number" step="0.01" />
    <input id="shipping" placeholder="Shipping Cost ($)" type="number" step="0.01" value="6.25"
